[package]
name = "recovery_receptor"
version = "0.1.0"
edition = "2021"

[dependencies]
# SQLite — must match the version pulled in by lair_keystore 0.6.2 (rusqlite ^0.36)
# so cargo deduplicates to a single libsqlite3-sys in the build.
rusqlite = { version = "0.36", features = ["bundled"] }

# Serialization (already workspace deps)
serde = { version = "1", features = ["derive"] }
serde_json = "1"
sha2 = "0.10"
tracing = "0.1"
uuid = { version = "1", features = ["v4"] }
futures-executor = "0.3"
tokio = { version = "1", features = ["rt", "rt-multi-thread"] }

# Map shared crates (types only — no WASM-only code in these)
holons_core = { path = "../../../shared_crates/holons_core" }
holons_client = { path = "../holons_client" }
core_types  = { path = "../../../shared_crates/type_system/core_types" }
holons_boundary = { path = "../../../shared_crates/holons_boundary" }