[package]
name = "holochain_runtime"
version = "0.1.0"
edition = "2021"

[dependencies]
# Holochain dependencies
holochain = { version = "0.6.1", default-features = false, features = [ "wasmer_sys", "transport-iroh", "schema" ] }
mr_bundle = {version = "0.6.1", default-features = false }
holochain_types = {version = "0.6.1", default-features = false }
holochain_keystore = {version = "0.6.1", default-features = false }
holochain_conductor_api = {version = "0.6.1", default-features = false }
holochain_util = {version = "0.6.1", default-features = false }

#kitsune_p2p_mdns = { path = "../mdns" }
kitsune_p2p_mdns = "*"
kitsune2_api = "*"
kitsune2_core = "*"

# Lair dependencies
lair_keystore_api = { version = "0.6.3", default-features = false }
lair_keystore = { version = "0.6.3", default-features = false }

# Holochain client
holochain_client = { version = "0.8", default-features = false }

# Other dependencies
tracing = { version = "0.1", features = ["log", "log-always"] }
arbitrary = "1"
derive_arbitrary = "1"
url2 = "0.0.6"
thiserror = "1.0"
one_err = "0"
serde = "1.0.193"
portpicker = "0.1"
log = "0.4"
async-std = "1.12"
local-ip-address = "0.6"
async-trait = "0.1"
sha256 = "1"
zip = { version = "0.6" }
serde_json = "1"
serde_yaml = "0.9"
base64 = "0.22"
tokio = "1"
anyhow = "1"

# Workaround: iroh-base-holochain 0.95.1 hard-pins ed25519-dalek = "=3.0.0-pre.1",
# which fails to compile against released RustCrypto crates. Pin pkcs8 to the
# same version Holochain's scaffolded zomes pin to, so consumers that mix this
# plugin with Holochain zomes get a consistent resolution. Remove once
# iroh-base-holochain publishes a release that unpins ed25519-dalek.
ed25519 = "=3.0.0-rc.0"
pkcs8 = "=0.11.0-rc.11"

[features]
default = ["sqlite-encrypted"]
sqlite = ["holochain/sqlite", "lair_keystore/rusqlite-bundled"]
sqlite-encrypted = ["holochain/sqlite-encrypted", "lair_keystore/rusqlite-bundled-sqlcipher-vendored-openssl"]