[package]
name = "holons"
version = "0.0.1"
edition = "2021"

[lib]
# WASM and non-WASM compatible
crate-type = ["cdylib", "rlib"]
name = "holons"

[dependencies]
# General Dependencies
serde = { workspace = true}
# Holochain Dependencies
hdk = "0.6"

#[target.'cfg(target_arch = "wasm32")'.dependencies]
# getrandom 0.3 is pulled in via feature unification: uuid v4 → rand 0.9 →
# rand_core 0.9 → getrandom 0.3. Backend selected via cfg in .cargo/config.toml.
# Do NOT use features = ["wasm_js"] — that pulls in wasm-bindgen.
#getrandom = { version = "0.3" }

[dev-dependencies]
pkcs8 = "=0.11.0-rc.11"

# MAP Dependencies

[dependencies.holons_core]
path = "../../../../shared_crates/holons_core"

[dependencies.holons_integrity]
path = "../../integrity/holons_integrity"

[dependencies.holons_guest_integrity]
path = "../../../crates/holons_guest_integrity"

[dependencies.integrity_core_types]
path = "../../../../shared_crates/type_system/integrity_core_types"

[dependencies.holons_guest]
path = "../../../crates/holons_guest"
