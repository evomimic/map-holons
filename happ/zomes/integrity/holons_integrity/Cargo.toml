[package]
name = "holons_integrity"
version = "0.0.1"
edition = "2021"

[lib]
# WASM and non-WASM compatible
crate-type = ["cdylib", "rlib"]
name = "holons_integrity"

[dependencies]


serde = { version = "1", features = ["derive"] }


# Holochain dependencies
hdi = "0.7"

#[target.'cfg(target_arch = "wasm32")'.dependencies]
#getrandom = { version = "0.3" }

[dependencies.holons_guest_integrity]
path = "../../../crates/holons_guest_integrity"

[dependencies.shared_validation]
path = "../../../../shared_crates/shared_validation"

[dependencies.integrity_core_types]
path = "../../../../shared_crates/type_system/integrity_core_types"

[dev-dependencies]
holochain_serialized_bytes = "*"
