name: CI

on:
  push:
    branches: [main, ci-fix]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.28.3/install

      - uses: cachix/cachix-action@v16
        with:
          name: holochain-ci

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          nix develop --command bash -c "npm ci"

      - name: Check SDK wire fixtures are up to date
        run: |
          nix develop --command bash -c "npm run regen:sdk-fixtures && git diff --exit-code host/map-sdk/tests/fixtures/"

      - name: Test
        run: |
          nix develop --command bash -c "npm test"

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          install_url: https://releases.nixos.org/nix/nix-2.28.3/install

      - uses: cachix/cachix-action@v16
        with:
          name: holochain-ci

      - uses: Swatinem/rust-cache@v2

      - name: Install dependencies
        run: |
          nix develop --command bash -c "npm ci"

      - name: Check formatting
        run: |
          nix develop --command bash -c "npm run fmt:check || (echo 'Formatting check failed. Run: npm run fmt' && exit 1)"

#  lint:
#    continue-on-error: true  # 👈 Make this advisory only
#    runs-on: ubuntu-latest
#    steps:
#      - uses: actions/checkout@v4
#
#      - name: Install nix
#        uses: cachix/install-nix-action@v31
#        with:
#          install_url: https://releases.nixos.org/nix/nix-2.28.3/install
#
#      - name: Clippy lint
#        run: |
#          nix develop --command cargo clippy --all-features -- -D warnings

  ci_pass:
    if: ${{ always() }}
    runs-on: ubuntu-latest
    needs: [ test, fmt ]  # 👈 exclude 'lint'
    steps:
      - name: Check status
        uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
