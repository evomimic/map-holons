types:
  - type_name: MapTypeKind
    type_kind: Enum
    described_by:
      $ref:
        type_name: MapTypeKindDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Map Type Kind
      description: Specifies the MAP TypeKind of this object.
      is_dependent: true
      is_value_type: true
      variants:
        - TypeKindHolon
        - TypeKindCollection
        - TypeKindProperty
        - TypeKindRelationship
        - TypeKindEnumVariant
        - TypeKindValueBoolean
        - TypeKindValueEnum
        - TypeKindValueInteger
        - TypeKindValueString
        - TypeKindValueBooleanArray
        - TypeKindValueEnumArray
        - TypeKindValueIntegerArray
        - TypeKindValueStringArray

  - type_name: DeletionSemanticType
    type_kind: Enum
    described_by:
      $ref:
        type_name: DeletionSemanticTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Deletion Semantic Type
      description: Offers different options handling requests to delete a source Holon of a relationship.
      is_dependent: true
      is_value_type: true
      variants:
        - DeletionSemanticAllow
        - DeletionSemanticBlock
        - DeletionSemanticCascade