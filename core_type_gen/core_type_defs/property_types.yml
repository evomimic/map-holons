types:
  - type_name: AllowDuplicates
    type_kind: Property
    described_by:
      $ref:
        type_name: AllowDuplicatesDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: AllowDuplicates
      description: If true, this collection can contain duplicate items.
      is_dependent: true
      is_value_type: true
      property_name: AllowDuplicates
      value_type_name: BooleanType(MapBooleanType)

  - type_name: TypeKind
    type_kind: Property
    described_by:
      $ref:
        type_name: TypeKindDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: TypeKind
      description: Specifies the MAP TypeKind of this object.
      is_dependent: true
      is_value_type: true
      property_name: TypeKind
      value_type_name: EnumType(MapTypeKind)

  - type_name: DeletionSemantic
    type_kind: Property
    described_by:
      $ref:
        type_name: DeletionSemanticDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: DeletionSemantic
      description: Offers different options for whether requests to delete a source Holon (i.e., mark as deleted) should be allowed for a given relationship.
      is_dependent: true
      is_value_type: true
      property_name: DeletionSemantic
      value_type_name: EnumType(DeletionSemanticType)

  - type_name: DescriptorName
    type_kind: Property
    described_by:
      $ref:
        type_name: DescriptorNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: DescriptorName
      description: The name for the unique key for the descriptor of MAP type.
      is_dependent: true
      is_value_type: true
      property_name: DescriptorName
      value_type_name: StringType(MapStringType)

  - type_name: Description
    type_kind: Property
    described_by:
      $ref:
        type_name: DescriptionDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Description
      description: A human readable description of this type that should clarify the purpose of the type and any caveats or to aware of.
      is_dependent: true
      is_value_type: true
      property_name: Description
      value_type_name: StringType(MapStringType)

  - type_name: IsBuiltinType
    type_kind: Property
    described_by:
      $ref:
        type_name: IsBuiltinTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: IsBuiltinType
      description: If `true`, this a type offered by Map Core. Otherwise this is an agent-defined type that extends the MapCore Schema.
      is_dependent: true
      is_value_type: true
      property_name: IsBuiltinType
      value_type_name: BooleanType(MapBooleanType)

  - type_name: IsDependent
    type_kind: Property
    described_by:
      $ref:
        type_name: IsDependentDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: IsDependent
      description: If true, then instances of this type cannot exist independently of some parent. For example, properties can not exist independently of their holon.
      is_dependent: true
      is_value_type: true
      property_name: IsDependent
      value_type_name: BooleanType(MapBooleanType)

  - type_name: IsOrdered
    type_kind: Property
    described_by:
      $ref:
        type_name: IsOrderedDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: IsOrdered
      description: If true, then the position of members of this collection conforms to some order. In other words, this collection behaves like an array
      is_dependent: true
      is_value_type: true
      property_name: IsOrdered
      value_type_name: BooleanType(MapBooleanType)

  - type_name: IsValueType
    type_kind: Property
    described_by:
      $ref:
        type_name: IsValueTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: IsValueType
      description: If true, this type can be used as the value type for a property.
      is_dependent: true
      is_value_type: true
      property_name: IsValueType
      value_type_name: BooleanType(MapBooleanType)

  - type_name: Label
    type_kind: Property
    described_by:
      $ref:
        type_name: LabelDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Label
      description: A human readable name for this property. Typically used in when displaying a property in the Human Experience of the map as part of a label/value pair
      is_dependent: true
      is_value_type: true
      property_name: Label
      value_type_name: StringType(MapStringType)

  - type_name: MaxCardinality
    type_kind: Property
    described_by:
      $ref:
        type_name: MaxCardinalityDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MaxCardinality
      description: Specifies the maximum number of members allowed in this collection. max_cardinality must be greater than or equal to min_cardinality.
      is_dependent: true
      is_value_type: true
      property_name: MaxCardinality
      value_type_name: IntegerType(MapIntegerType)

  - type_name: MaxLength
    type_kind: Property
    described_by:
      $ref:
        type_name: MaxLengthDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MaxLength
      description: max_length is a property of a value type based on the TypeKind MapString. It defines the maximum allowed length for string instances of this value type. max_length must be greater than or equal to min_length.
      is_dependent: true
      is_value_type: true
      property_name: MaxLength
      value_type_name: IntegerType(MapIntegerType)

  - type_name: MaxValue
    type_kind: Property
    described_by:
      $ref:
        type_name: MaxValueDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MaxValue
      description: max_value is a property of a value type based on the TypeKind MapInteger. It defines the largest allowed value for this integer instances of this value type. max_value must be greater than or equal to min_value.
      is_dependent: true
      is_value_type: true
      property_name: MaxValue
      value_type_name: IntegerType(MapIntegerType)

  - type_name: MinCardinality
    type_kind: Property
    described_by:
      $ref:
        type_name: MinCardinalityDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MinCardinality
      description: Specifies the minimum number of members allowed in this collection. min_cardinality must be greater than or equal to zero.
      is_dependent: true
      is_value_type: true
      property_name: MinCardinality
      value_type_name: IntegerType(MapIntegerType)

  - type_name: MinLength
    type_kind: Property
    described_by:
      $ref:
        type_name: MinLengthDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MinLength
      description: min_length is a property of a value type based on the TypeKind MapString. It defines the minimum allowed length for string instances of this value type. min_length must be greater than or equal to zero.
      is_dependent: true
      is_value_type: true
      property_name: MinLength
      value_type_name: IntegerType(MapIntegerType)

  - type_name: MinValue
    type_kind: Property
    described_by:
      $ref:
        type_name: MinValueDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MinValue
      description: min_value is a property of a value type based on the TypeKind MapInteger. It defines the smallest allowed value for this integer instances of this value type. min_value can be negative and must be less than or equal to max_value.
      is_dependent: true
      is_value_type: true
      property_name: MinValue
      value_type_name: IntegerType(MapIntegerType)

  - type_name: Name
    type_kind: Property
    described_by:
      $ref:
        type_name: NameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Name
      description: Specifies the human-readable name for this Holon.
      is_dependent: true
      is_value_type: true
      property_name: Name
      value_type_name: StringType(MapStringType)

  - type_name: PropertyTypeName
    type_kind: Property
    described_by:
      $ref:
        type_name: PropertyTypeNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: PropertyTypeName
      description: Specifies the (internal) name for this property type.
      is_dependent: true
      is_value_type: true
      property_name: PropertyTypeName
      value_type_name: StringType(PropertyNameType)

  - type_name: RelationshipName
    type_kind: Property
    described_by:
      $ref:
        type_name: RelationshipNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: RelationshipName
      description: Specifies the (internal) name for this relationship type.
      is_dependent: true
      is_value_type: true
      property_name: RelationshipName
      value_type_name: StringType(RelationshipNameType)

  - type_name: SchemaName
    type_kind: Property
    described_by:
      $ref:
        type_name: SchemaNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: SchemaName
      description: Specifies the human-readable name for this schema.
      is_dependent: true
      is_value_type: true
      property_name: SchemaName
      value_type_name: StringType(MapStringType)

  - type_name: TypeName
    type_kind: Property
    described_by:
      $ref:
        type_name: TypeNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: TypeName
      description: Specifies the (internal) name for this type.
      is_dependent: true
      is_value_type: true
      property_name: TypeName
      value_type_name: StringType(MapStringType)

  - type_name: VariantName
    type_kind: Property
    described_by:
      $ref:
        type_name: VariantNameDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: VariantName
      description: Specifies the (internal) name for this Variant.
      is_dependent: true
      is_value_type: true
      property_name: VariantName
      value_type_name: StringType(MapStringType)

  - type_name: VariantOrder
    type_kind: Property
    described_by:
      $ref:
        type_name: VariantOrderDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: VariantOrder
      description: Specifies the ordering (e.g., for sorting or salience purposes) for this specific variant relative to other variants in this enum.
      is_dependent: true
      is_value_type: true
      property_name: VariantOrder
      value_type_name: IntegerType(MapIntegerType)

  - type_name: Version
    type_kind: Property
    described_by:
      $ref:
        type_name: VersionDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: Version
      description: Specifies the semantic version of this type descriptor.
      is_dependent: true
      is_value_type: true
      property_name: Version
      value_type_name: StringType(SemanticVersionType)