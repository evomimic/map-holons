types:
  - type_name: MapStringType
    type_kind: Value(String)
    described_by:
      $ref:
        type_name: MapStringTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: MapString
      description: Built-in MAP String Type
      is_dependent: true
      is_value_type: false
      min_length: 0
      max_length: 32768

  - type_name: PropertyNameType
    type_kind: Value(String)
    described_by:
      $ref:
        type_name: PropertyNameTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: PropertyName
      description: Names for Holon properties. Should be snake_case
      is_dependent: true
      is_value_type: false
      min_length: 3
      max_length: 72

  - type_name: RelationshipNameType
    type_kind: Value(String)
    described_by:
      $ref:
        type_name: RelationshipNameTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: RelationshipName
      description: Names for relationships between Holons. To align with OpenCypher/GQL standard, should be SCREAMING_UPPER_CASE (all uppercase letters with words separated by underscores).
      is_dependent: true
      is_value_type: false
      min_length: 3
      max_length: 72

  - type_name: SemanticVersionType
    type_kind: Value(String)
    described_by:
      $ref:
        type_name: SemanticVersionTypeDescriptor
        schema: CoreSchema
        space: https://space.map/schema
    spec:
      label: SemanticVersion
      description: String Type for representing Semantic Versions of the form (<major>.<minor>.<patch>)
      is_dependent: true
      is_value_type: false
      min_length: 5
      max_length: 14